<title>Prolific</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

/* GIF Section Styling */
.title-container { display: flex; flex-direction: column; gap: 8px; }
.gif-container { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: flex-start; }
.gif-item { 
  width: 42px; 
  height: 42px; 
  border-radius: 6px; 
  object-fit: cover; 
  background: transparent; 
  box-shadow: none; 
}
.gif-trunks { object-position: top; } /* Shifts Trunks upward so he isn't cropped */
.gif-piccolo { object-position: top; } /* Piccolo's gif is tall, so keep his head/torso in frame */
.mascot-slot{ position:relative; display:flex; flex-direction:column; align-items:center; }
.mascot-badge{
  position:absolute; top:100%; left:50%; transform:translateX(-50%); margin-top:2px;
  font-size:8px; font-family:'JetBrains Mono',monospace; font-weight:700;
  background:var(--purple); color:#fff; padding:1px 4px; line-height:1.5;
  text-align:center; border-radius:8px; cursor:default; white-space:nowrap;
}

:root{
  --board-bg:#FBF6EC;
  --board-bg2:#F1E9D2;
  --frame:#1F3D2B;
  --frame2:#142A1C;
  --ink:#2B2A28;
  --ink-soft:#6E6557;
  --line:#E5DBC0;
  --card:#FFFFFF;
  --blue:#2E78C9;
  --green:#3FA86B;
  --pink:#E0508B;
  --orange:#F2962E;
  --purple:#8C5FD1;
  --teal:#1FA3A3;
  --lime:#7DAF3C;
  --danger:#D64545;
  --chalk:#F5F2E6;
  --paper-rule:#BFD7EE;
  --margin-red:#E2675C;
  --wood:#7C4A26;
  --shadow: 0 1px 2px rgba(60,46,16,.07), 0 4px 14px rgba(60,46,16,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
button, .chip, .check, .cal-cell, .tab, .avatar{ touch-action:manipulation; }
body{
  margin:0;
  background:var(--board-bg);
  background-image: linear-gradient(var(--paper-rule) 1px, transparent 1px);
  background-size: 100% 28px;
  font-family:'Inter',sans-serif;
  color:var(--ink);
  min-height:100vh;
}
.app{max-width:880px;margin:0 auto;padding:18px 18px 60px; position:relative;}
.app::before{
  content:"";
  position:absolute; top:0; bottom:0; left:9px; width:2px;
  background:var(--margin-red); opacity:.5; pointer-events:none;
}

.frame{
  background:linear-gradient(160deg,var(--frame),var(--frame2));
  border-radius:14px; padding:18px 22px; color:var(--chalk);
  box-shadow:var(--shadow); position:relative; overflow:hidden;
  border:5px solid var(--wood);
}
.frame::after{ content:""; position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(circle at 90% 0%, rgba(255,255,255,.07), transparent 60%),
    repeating-radial-gradient(circle at 0 0, rgba(255,255,255,.05) 0px, transparent 1.2px, transparent 3px);
  background-size: auto, 5px 5px;
}
.frame-top{}
.frame-title{ font-family:'Kalam',cursive; font-weight:700; font-size:28px; letter-spacing:.3px;
  text-shadow: 0 0 1px rgba(245,242,230,.5), 0 0 7px rgba(245,242,230,.18); }
.frame-title-row{display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.frame-date{font-size:14px;font-family:'Kalam',cursive;font-weight:700;color:#CFE0D4;}
.members-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;align-items:center;}
.who-pill{
  margin-left:auto;font-size:12px;color:#CFE0D4;display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.08); padding:6px 10px; border-radius:20px; cursor:pointer;
  border:1px solid rgba(255,255,255,.12);
}
.who-pill:hover{background:rgba(255,255,255,.14);}

.bell-btn{
  position:relative; cursor:pointer; font-size:18px; color:#fff;
  padding:8px 10px; border-radius:10px; min-width:38px; min-height:38px;
  display:inline-flex; align-items:center; justify-content:center;
}
.bell-btn:hover, .bell-btn:active{ background:rgba(255,255,255,.12); }
.badge{
  position:absolute; top:0; right:0; background:var(--danger); color:#fff;
  font-size:10.5px; font-weight:700; border-radius:10px; padding:1px 5px; line-height:1.4;
  font-family:'Inter',sans-serif; min-width:16px; text-align:center;
}

.avatar{
  width:34px;height:34px;border-radius:50%; overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;color:#fff;
  border:2px solid rgba(255,255,255,.55); flex:none;
}
.avatar img{width:100%;height:100%;object-fit:cover;display:block;}
.avatar.sm{width:24px;height:24px;font-size:10.5px;border-width:1.5px;}
.avatar.add{background:rgba(255,255,255,.12);border:2px dashed rgba(255,255,255,.4);cursor:pointer;font-size:18px;}
.members-row .avatar{cursor:pointer;}
.name-tag{display:flex;align-items:center;gap:6px;font-size:13px;color:#E8E9ED;}

.tabs{display:flex;gap:6px;margin:18px 0 16px;overflow-x:auto;padding-bottom:2px;}
.tab{
  font-family:'Kalam',cursive;font-weight:700;font-size:16px;
  padding:11px 16px 9px;border-radius:10px 10px 4px 4px;min-height:42px;
  background:var(--board-bg2);color:var(--ink-soft);
  border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;
}
.tab.active{background:var(--card);color:var(--ink);box-shadow:var(--shadow);}
.tab[data-tab="calendar"].active{border-bottom-color:var(--blue);}
.tab[data-tab="dashboard"].active{border-bottom-color:var(--purple);}
.tab[data-tab="grocery"].active{border-bottom-color:var(--lime);}
.tab[data-tab="chores"].active{border-bottom-color:var(--green);}
.tab[data-tab="reminders"].active{border-bottom-color:var(--orange);}
.tab[data-tab="bills"].active{border-bottom-color:var(--teal);}
.tab[data-tab="rules"].active{border-bottom-color:var(--pink);}

.card{ background:var(--card);border-radius:14px;padding:16px 18px; box-shadow:var(--shadow); margin-bottom:14px; }
.card h3{margin:0 0 10px;font-family:'Kalam',cursive;font-size:19px;font-weight:700;}
.section-label{ font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase; color:var(--ink-soft);margin:22px 2px 8px; }
.empty{color:var(--ink-soft);font-size:14px;padding:14px 4px;}

.row{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--line);}
.row:last-child{border-bottom:none;}
.row-main{flex:1;min-width:0;}
.row-title{font-weight:600;font-size:14.5px;}
.row-sub{font-size:12.5px;color:var(--ink-soft);margin-top:1px;}
.tag{ font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px; background:var(--board-bg2);color:var(--ink-soft);white-space:nowrap; }
.tag.birthday{background:#FCE8EF;color:var(--pink);}
.tag.event{background:#E9F1FC;color:var(--blue);}
.tag.overdue{background:#FBEAEA;color:var(--danger);}
.tag.today{background:#FFF1DF;color:var(--orange);}

button.btn{ font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;
  background:var(--blue);color:#fff;border:none;border-radius:8px; padding:11px 16px;cursor:pointer;min-height:42px; }
button.btn:hover{background:#2563AD;}
button.btn:active{background:#2563AD;}
button.btn.ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line);}
button.btn.ghost:hover{background:var(--board-bg2);}
button.btn.ghost:active{background:var(--board-bg2);}
button.icon-btn{ background:none;border:none;cursor:pointer;color:var(--ink-soft);font-size:16px;padding:7px 9px;border-radius:8px;min-width:34px;min-height:34px;display:inline-flex;align-items:center;justify-content:center; }
button.icon-btn:hover{background:var(--board-bg2);color:var(--ink);}
button.icon-btn:active{background:var(--board-bg2);color:var(--ink);}
.action-sheet{display:flex;flex-direction:column;gap:2px;margin-top:4px;}
.action-sheet-btn{
  display:flex;align-items:center;gap:12px;width:100%;text-align:left;
  background:none;border:none;border-radius:10px;padding:13px 10px;
  font-size:14.5px;font-family:'Inter',sans-serif;color:var(--ink);cursor:pointer;
}
.action-sheet-btn:hover, .action-sheet-btn:active{background:var(--board-bg2);}
.action-sheet-btn .icon{font-size:17px;width:22px;text-align:center;flex:none;}

input,select,textarea{ font-family:'Inter',sans-serif;font-size:16px; border:1px solid var(--line);border-radius:8px;padding:10px 11px; background:#fff;color:var(--ink); width:100%; }
input:focus,select:focus,textarea:focus{outline:2px solid var(--blue);outline-offset:0;}
.form-grid{display:grid;gap:10px;margin-bottom:10px;}
.form-row{display:flex;gap:10px;flex-wrap:wrap;}
.form-row > *{flex:1;min-width:120px;}
label{font-size:12px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:4px;}

.chip-select{display:flex;gap:6px;flex-wrap:wrap;}
.chip{ font-size:13px;padding:8px 13px;border-radius:20px;border:1.5px solid var(--line);
  cursor:pointer;background:#fff;color:var(--ink-soft);user-select:none; }
.chip.active{border-color:transparent;color:#fff;}
.chip:active{opacity:.75;}
.who-chip{display:flex;align-items:center;gap:7px;padding:6px 13px 6px 6px;}
.who-chip-avatar{cursor:pointer;display:flex;}
.who-chip-name{cursor:pointer;}

.check{ width:24px;height:24px;border-radius:50%;border:2px solid var(--line);
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;font-size:13px;color:#fff; }
.check:active{transform:scale(0.9);}
.check.done{background:var(--green);border-color:var(--green);}

.balance-amt{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:14px;}
.level-badge{ font-family:'JetBrains Mono',monospace; font-weight:600; font-size:11px; color:#fff;
  background:var(--purple); border-radius:20px; padding:2px 8px; white-space:nowrap; }
.xp-bar-track{ background:var(--board-bg2); border-radius:20px; height:6px; width:100%; overflow:hidden; margin-top:5px; }
.xp-bar-fill{ background:linear-gradient(90deg,var(--purple),var(--pink)); height:100%; border-radius:20px; }
.pos{color:var(--green);} .neg{color:var(--danger);}

.note{ background:#FFFCEF;border:1px solid #F0E6BE;border-radius:10px; padding:12px 14px;margin-bottom:10px;position:relative; }
.note.done{opacity:.55;}
.note-msg{font-size:14px;}
.note-meta{font-size:11.5px;color:var(--ink-soft);margin-top:6px;display:flex;justify-content:space-between;align-items:center;}

.overlay{ position:fixed;inset:0;background:rgba(32,36,43,.55);
  display:flex;align-items:center;justify-content:center;z-index:50;padding:18px; }
.modal{ background:#fff;border-radius:16px;padding:22px;max-width:460px;width:100%;
  box-shadow:0 20px 50px rgba(0,0,0,.3); max-height:88vh; overflow-y:auto; }
.modal h3{font-family:'Kalam',cursive;font-size:21px;margin:0 0 14px;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;}

.loading-screen{ position:fixed;inset:0;background:var(--board-bg);display:flex;align-items:center;justify-content:center;
  font-family:'Kalam',cursive;font-size:18px;color:var(--ink-soft);z-index:100; }

.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-title{font-family:'Kalam',cursive;font-weight:700;font-size:19px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--ink-soft);padding-bottom:4px;}
.cal-cell{min-height:54px;border-radius:8px;background:var(--board-bg2);padding:5px 4px;cursor:pointer;position:relative;}
.cal-photo-badge{position:absolute;bottom:3px;right:4px;font-size:10px;line-height:1;}
.cal-cell.empty{background:transparent;cursor:default;}
.cal-cell:hover:not(.empty){background:#E7E5DC;}
.cal-cell.today{box-shadow:inset 0 0 0 2px var(--blue);}
.cal-cell.selected{background:var(--frame);}
.cal-cell.selected .cal-daynum{color:#fff;}
.cal-daynum{font-size:12.5px;font-weight:600;}
.cal-dots{display:flex;gap:2px;margin-top:4px;flex-wrap:wrap;}
.cal-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);}
.cal-dot.birthday{background:var(--pink);}
.error-text{color:var(--danger);font-size:12.5px;margin-top:8px;}

@media (max-width:520px){
  .frame-title{font-size:19px;}
  .frame-title-row{gap:6px;}
  .frame-date{font-size:13px;}
  .who-pill{margin-left:0;width:100%;justify-content:center;}
  .cal-cell{min-height:40px;}
  .gif-container{ gap:4px; }
  .gif-item{ width:34px; height:34px; border-radius:5px; }
}
@media (max-width:399px){
  .gif-container{ gap:3px; }
  .gif-item{ width:28px; height:28px; border-radius:4px; }
}
@media (max-width:334px){
  .gif-container{ gap:3px; }
  .gif-item{ width:24px; height:24px; border-radius:4px; }
}

/* ---------- DASHBOARD CHALKBOARD THEME ----------
   Scoped to .chalk-dashboard (applied to #content only while the Dashboard tab is
   active) so every other tab keeps the regular paper/card look untouched.
   Overriding the variables (not just specific classes) means inline styles inside
   the dashboard's own templates — e.g. style="color:var(--ink-soft)" — pick up the
   right chalk-appropriate colors automatically too. */
.chalk-dashboard{
  --ink: var(--chalk);
  --ink-soft: #BFD2C7;
  --line: rgba(255,255,255,.18);
  --board-bg2: rgba(255,255,255,.12);
  color: var(--ink);
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:14px;
  align-items:start;
}
.chalk-dashboard .card{ grid-column: 1 / -1; margin-bottom:0; }
.chalk-dashboard .card.card-half{ grid-column: span 1; }
.chalk-dashboard .note, .chalk-dashboard .note-meta, .chalk-dashboard .note-msg{ color:#3A3527; }
.chalk-dashboard .risk-banner{ color:#3A3527; }
.chalk-dashboard .risk-banner b{ color:#7A4A12; }
.levelup-modal{ animation: levelupPop 0.5s cubic-bezier(.34,1.56,.64,1); }
@keyframes levelupPop{ 0%{transform:scale(.4) rotate(-10deg);opacity:0;} 100%{transform:scale(1) rotate(0deg);opacity:1;} }
.levelup-gif{ width:120px;height:120px;object-fit:cover;border-radius:16px;margin:6px auto 0; display:block; animation: levelupBounce 1.1s ease-in-out infinite; box-shadow:0 6px 20px rgba(0,0,0,.25); }
@keyframes levelupBounce{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
.levelup-confetti{ font-size:22px; letter-spacing:4px; animation: levelupConfetti 1.4s ease-in-out infinite; }
@keyframes levelupConfetti{ 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-4px) scale(1.08);} }
@media (max-width:680px){
  .chalk-dashboard{ grid-template-columns: 1fr; }
  .chalk-dashboard .card.card-half{ grid-column: 1; }
}
.chalk-dashboard .card{
  background:linear-gradient(160deg,var(--frame),var(--frame2));
  border:4px solid var(--wood);
  position:relative;
  overflow:hidden;
}
.chalk-dashboard .card::after{
  content:""; position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(circle at 90% 0%, rgba(255,255,255,.06), transparent 60%),
    repeating-radial-gradient(circle at 0 0, rgba(255,255,255,.045) 0px, transparent 1.2px, transparent 3px);
  background-size: auto, 5px 5px;
}
.chalk-dashboard .card h3{
  font-family:'Kalam',cursive;
  text-shadow: 0 0 1px rgba(245,242,230,.45), 0 0 6px rgba(245,242,230,.15);
}
.chalk-dashboard button.icon-btn:hover, .chalk-dashboard button.icon-btn:active{ color:#fff; }
.chalk-dashboard button.btn.ghost{ background:transparent; color:var(--chalk); }
.chalk-dashboard button.btn.ghost:hover, .chalk-dashboard button.btn.ghost:active{ background:rgba(255,255,255,.12); }
.chalk-dashboard .tag{ background:rgba(255,255,255,.14); }
.chalk-dashboard .tag.birthday{ background:rgba(224,80,139,.25); color:#FFB8D3; }
.chalk-dashboard .tag.event{ background:rgba(46,120,201,.3); color:#AFD4F7; }
.chalk-dashboard .tag.overdue{ background:rgba(214,69,69,.3); color:#FFB0AE; }
.chalk-dashboard .tag.today{ background:rgba(242,150,46,.3); color:#FFD08F; }
.chalk-dashboard .chip{ background:rgba(255,255,255,.1); border-color:rgba(255,255,255,.3); }
.chalk-dashboard .balance-amt{ color:var(--chalk); }
.chalk-dashboard .balance-amt.pos{ color:#8FE2A8; }
.chalk-dashboard .balance-amt.neg{ color:#FF9E9E; }
.chalk-dashboard .xp-bar-track{ background:rgba(255,255,255,.18); }
.chalk-dashboard .level-badge{ box-shadow:0 0 0 1px rgba(255,255,255,.25); }

/* ==========================================================================
   TAMAGOTCHI PET WIDGET
   ========================================================================== */
.game-layout { display: flex; gap: 18px; flex-wrap: wrap; }
.pet-screen-column { flex: 1; min-width: 220px; display: flex; flex-direction: column; align-items: center; }
.pet-viewport {
  background: #eef2f7;
  border: 4px solid #333;
  border-radius: 14px;
  width: 100%;
  height: 200px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 4px 10px rgba(0,0,0,0.08);
  transition: background 0.5s ease;
}
.pet-viewport.sleeping-mode { background: #111827 !important; }
.chao-graphics-wrap { width: 130px; height: auto; transition: transform 0.2s ease; z-index: 2; }
.chao-graphics-wrap img { width: 100%; height: auto; display: block; }
.chao-graphics-wrap img.pixel-art { image-rendering: pixelated; image-rendering: crisp-edges; }
.chao-float { animation: petFloat 2s ease-in-out infinite; }
.chao-chew { animation: petChew 0.3s ease infinite; }
.egg-wobble { animation: eggShake 0.4s ease-in-out alternate infinite; }
@keyframes petFloat { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-8px); } }
@keyframes petChew { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.15,0.85); } }
@keyframes eggShake { 0%{ transform: rotate(-8deg); } 100%{ transform: rotate(8deg); } }
.status-badge-overlay {
  position: absolute; top: 10px; right: 10px; background: var(--danger); color: white;
  font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: bold; z-index: 10;
}
.mess-element { position: absolute; bottom: 10px; left: 18px; font-size: 22px; z-index: 3; }
.sleep-zzz { position:absolute; top:14px; left:18px; font-size:18px; z-index:3; color:#fff; opacity:.85; }
.pet-controls-column { flex: 1.2; min-width: 240px; display: flex; flex-direction: column; justify-content: space-between; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.stat-box { background: #f8fafc; padding: 9px 10px; border-radius: 10px; border: 1px solid #e2e8f0; }
.stat-header { display: flex; justify-content: space-between; font-size: 11.5px; font-weight: 600; color: var(--ink-soft); margin-bottom: 4px; }
.stat-progress-bar { background: #e2e8f0; height: 7px; border-radius: 10px; overflow: hidden; }
.stat-fill-inner { height: 100%; border-radius: 10px; transition: width 0.3s cubic-bezier(0.4,0,0.2,1); }
.actions-button-matrix { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
.action-btn {
  padding: 9px 4px; font-weight: bold; font-size: 12.5px; border: 2px solid #2d3748;
  background: white; border-radius: 8px; cursor: pointer; box-shadow: 0 3px 0 #2d3748;
  display: flex; flex-direction: column; align-items: center; gap: 3px; transition: all 0.1s ease;
  font-family: 'Inter', sans-serif;
}
.action-btn:active { transform: translateY(3px); box-shadow: 0 0 0 #2d3748; }
.action-btn:disabled { opacity:.45; cursor:default; box-shadow:0 3px 0 #94a3b8; border-color:#94a3b8; }
.action-btn:disabled:active { transform:none; }
.minigame-deck { background: #f1f5f9; border-radius: 12px; padding: 12px; margin-top: 12px; border: 1px dashed #cbd5e1; text-align: center; }
.minigame-box { background: white; border: 2px solid #333; height: 56px; border-radius: 8px; margin: 10px 0; position: relative; overflow: hidden; display: none; }
.minigame-target-zone { position: absolute; top: 0; bottom: 0; left: 68%; width: 17%; background: var(--green); opacity: 0.6; }
.minigame-moving-bar { position: absolute; top: 0; bottom: 0; left: 0%; width: 6px; background: var(--danger); animation: barSweep 1.7s linear infinite alternate; }
@keyframes barSweep { 0%{ left:0%; } 100%{ left:97%; } }
.minigame-menu-buttons { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
.minigame-menu-btn { padding: 6px 12px; font-size: 12px; background: white; border: 1px solid #94a3b8; border-radius: 6px; cursor: pointer; font-weight: 600; font-family:'Inter',sans-serif; }
.minigame-card-row { display: flex; justify-content: center; gap: 10px; margin: 10px 0; }
.minigame-card { width: 54px; height: 72px; background: var(--blue); color: white; border-radius: 6px; border: 2px solid #1e40af; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; cursor: pointer; transition: transform 0.15s; }
.minigame-card:hover { transform: scale(1.06); }

function normalizeState(){
  if(!Array.isArray(state.groceryItems)) state.groceryItems = [];
  if(!Array.isArray(state.xpLog)) state.xpLog = [];
  if(!Array.isArray(state.weeklyScorecard)) state.weeklyScorecard = [];

  state.members.forEach(m=>{ if(typeof m.lastSeenLevel !== 'number') m.lastSeenLevel = levelInfo(memberXP(m.id).total).level; });
  // one-time migration of the old flat-rate logs into the unified, source-tagged xpLog
  if(Array.isArray(state.completionLog) && state.completionLog.length){

}

/* ---------- avatar upload ---------- */
function fileToResizedDataUrl(file, maxSize=140){
  return new Promise((resolve,reject)=>{
    let settled = false;
    const done = (fn, val)=>{ if(settled) return; settled = true; clearTimeout(timer); fn(val); };
    // Some iPhone photos (HEIC) can stall silently mid-decode in Safari without
    // ever firing onload or onerror — this timeout turns that silent hang into
    // a visible error instead of the upload just appearing to do nothing.
    const timer = setTimeout(()=> done(reject, new Error('decode-timeout')), 8000);
    const reader = new FileReader();
    reader.onerror = ()=> done(reject, reader.error);
    reader.onload = e=>{
      const img = new Image();
      img.onerror = ()=> done(reject, new Error('image-decode-failed'));
      img.onload = ()=>{
        try{
          const side = Math.min(img.width, img.height);
          const sx = (img.width-side)/2, sy=(img.height-side)/2;
          const canvas = document.createElement('canvas');
          canvas.width = maxSize; canvas.height = maxSize;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, sx, sy, side, side, 0, 0, maxSize, maxSize);
          done(resolve, canvas.toDataURL('image/jpeg', 0.85));
        }catch(err){ done(reject, err); }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function fileToResizedPhoto(file, maxDim=1000, quality=0.6){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = e=>{
      const img = new Image();
      img.onerror = reject;
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w>=h){ if(w>maxDim){ h = Math.round(h*maxDim/w); w = maxDim; } }
        else { if(h>maxDim){ w = Math.round(w*maxDim/h); h = maxDim; } }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
/* Photo bytes live in their own small Firestore doc per day (collection
   'dayPhotoImages'), separate from the main app state. Only metadata
   (id/who/when) lives in state.dayPhotos, so the main state document stays
   small and fast no matter how many photos get added. */
async function getDayPhotoImages(dateStr){
  if(dayPhotoImageCache[dateStr]) return dayPhotoImageCache[dateStr];
  try{
    const snap = await getDoc(doc(db, 'dayPhotoImages', dateStr));
    const data = snap.exists() ? snap.data() : {};
    dayPhotoImageCache[dateStr] = data;
    return data;
  } catch(e){ console.error('load day photo images failed', e); return {}; }
}
async function uploadDayPhoto(dateStr, file){
  const dataUrl = await fileToResizedPhoto(file);
  const photoId = uid();
  const existing = await getDayPhotoImages(dateStr);
  const updated = { ...existing, [photoId]: dataUrl };
  await setDoc(doc(db, 'dayPhotoImages', dateStr), updated);
  dayPhotoImageCache[dateStr] = updated;
  return { id: photoId, addedBy: currentUserId, addedAt: Date.now() };
}
async function deleteDayPhoto(dateStr, photoMeta){
  try{
    const existing = await getDayPhotoImages(dateStr);
    const updated = { ...existing };
    delete updated[photoMeta.id];
    await setDoc(doc(db, 'dayPhotoImages', dateStr), updated);
    dayPhotoImageCache[dateStr] = updated;
  } catch(e){ console.error('delete day photo failed', e); }
  if(state.dayPhotos && state.dayPhotos[dateStr]){
    state.dayPhotos[dateStr] = state.dayPhotos[dateStr].filter(p=>p.id!==photoMeta.id);
    if(state.dayPhotos[dateStr].length===0) delete state.dayPhotos[dateStr];
  }
  await saveState();
}

/* ---------- GOOGLE CALENDAR SYNC ----------
   Browser-only OAuth (no backend) via Google Identity Services. Each housemate
   signs in with their own Google account; the access token only lives for this
   session, so this is an on-demand "sync now" action rather than continuous
   background sync — there's no server here to silently refresh tokens. */
function requestGoogleAccessToken(){
  return new Promise((resolve, reject)=>{
    if(!window.google || !window.google.accounts || !window.google.accounts.oauth2){
      reject(new Error("Google sign-in hasn't finished loading yet — try again in a moment."));
      return;
    }
    const client = window.google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: GOOGLE_CALENDAR_SCOPE,
      callback: (resp)=>{
        if(!resp || resp.error){ reject(new Error((resp && resp.error) || 'Google sign-in was cancelled or failed.')); return; }
        resolve(resp.access_token);
      }
    });
    client.requestAccessToken();
  });
}
async function fetchGoogleCalendarEvents(accessToken){
  const timeMin = new Date(); timeMin.setMonth(timeMin.getMonth()-1);
  const timeMax = new Date(); timeMax.setMonth(timeMax.getMonth()+6);
  const params = new URLSearchParams({
    timeMin: timeMin.toISOString(), timeMax: timeMax.toISOString(),
    singleEvents: 'true', orderBy: 'startTime', maxResults: '250'
  });
  const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?${params}`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  if(!res.ok){ throw new Error('Google Calendar request failed (status '+res.status+')'); }
  const data = await res.json();
  return data.items || [];
}
function importGoogleEvents(items, importedByMemberId){
  state.events = state.events || [];
  let added = 0, updated = 0;
  items.forEach(item=>{
    if(!item.start || item.status==='cancelled') return;
    const dateStr = item.start.date || (item.start.dateTime ? item.start.dateTime.slice(0,10) : null);
    if(!dateStr) return;
    const title = item.summary || '(untitled event)';
    const existing = state.events.find(e=> e.source==='google' && e.sourceId===item.id);
    if(existing){ existing.title = title; existing.date = dateStr; updated++; }
    else { state.events.push({ id:uid(), title, date:dateStr, type:'event', source:'google', sourceId:item.id, importedBy:importedByMemberId, createdBy:importedByMemberId, visibility:'private', visibleTo:[] }); added++; }
  });
  return { added, updated };
}

async function init(){
  selectedCalDate = todayStr();
  await loadState();
  if(scoreCompletedWeeks()) await saveState();
  if(!state.importedDefaultChores){
    seedImportedChores();
    state.importedDefaultChores = true;
    await saveState();
  }
  if(!state.mergedFrontDoorTowel){
    const fd = state.chores.find(c=>c.title==='Front door & shoe organization');
    const tw = state.chores.find(c=>c.title==='Towel restock & laundry');
    if(fd && tw){
      fd.title = 'Front door & shoe organization + towel restock & laundry';
      state.chores = state.chores.filter(c=>c.id!==tw.id);
      await saveState();
    }
    state.mergedFrontDoorTowel = true;
    await saveState();
  }
  if(!state.mascotsAutoAssigned){
    const MASCOT_NAME_MAP = {
      'jimmy': 'Piccolo GIF.gif',
      'christi': 'Cinamoroll GIF.gif',
      'hd': 'totoro-jumping.gif',
      'kaitlin': 'Kuromi GIF.gif',
      'andy': 'Trunks GIF.gif',
      'shayla': 'Hello Kitty GIF.gif',
      'ryan': 'Zoro GIF.gif',
    };
    state.members.forEach(m=>{
      const key = m.name.trim().toLowerCase();
      if(MASCOT_NAME_MAP[key] && !m.mascotGif){
        m.mascotGif = MASCOT_NAME_MAP[key];
      }
    });
    state.mascotsAutoAssigned = true;
    await saveState();
  }
  try{
    const remembered = localStorage.getItem('house-board-who-am-i');
    if(remembered && state.members.some(m=>m.id===remembered)){ currentUserId = remembered; }
  } catch(e){}
  document.getElementById('todayDate').textContent = new Date().toLocaleDateString(undefined, window.innerWidth<=520 ? {weekday:'short',month:'short',day:'numeric'} : {weekday:'long',month:'long',day:'numeric'});
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('app').style.display='block';

  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click', ()=>{ activeTab = t.dataset.tab; render(); });
  });

  document.getElementById('avatarFileInput').addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(!file || !pendingAvatarMemberId){ e.target.value=''; return; }
    if(!file.type.startsWith('image/')){
      alert("That file doesn't look like a photo. Try a JPEG or PNG.");
      e.target.value=''; return;
    }
    if(file.size > 15*1024*1024){
      alert("That photo is too large (over 15MB). Try a smaller photo or a screenshot of it.");
      e.target.value=''; return;
    }
    try{
      const dataUrl = await fileToResizedDataUrl(file);
      const m = memberById(pendingAvatarMemberId);
      if(!m){ alert("Couldn't find that housemate anymore — try again."); e.target.value=''; return; }
      m.avatarData = dataUrl;
      await saveState();
      renderMembersRow();
      if(activeWhoAreYouRefresh) activeWhoAreYouRefresh();
      render();
    } catch(err){
      console.error('avatar upload failed', err);
      alert("Couldn't load that photo. Try a different one (JPEG or PNG works best) — some photo formats from phones (like HEIC) aren't supported by every browser.");
    }
    e.target.value = '';
  });

  document.getElementById('dayPhotoFileInput').addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(!file || !pendingPhotoDate){ e.target.value=''; return; }
    if(!file.type.startsWith('image/')){
      alert("That file doesn't look like a photo. Try a JPEG or PNG.");
      e.target.value=''; return;
    }
    if(file.size > 20*1024*1024){
      alert("That photo is too large (over 20MB). Try a smaller photo.");
      e.target.value=''; return;
    }
    try{
      const rec = await uploadDayPhoto(pendingPhotoDate, file);
      state.dayPhotos = state.dayPhotos || {};
      state.dayPhotos[pendingPhotoDate] = state.dayPhotos[pendingPhotoDate] || [];
      state.dayPhotos[pendingPhotoDate].push(rec);
      await saveState();
      render();
    } catch(err){
      console.error('photo upload failed', err);
      alert("Couldn't upload that photo. Make sure Firebase Storage is set up, and check your connection.");
    }
    e.target.value = '';
  });

  renderMembersRow();
  if(state.members.length===0){ openMemberModal(true); }
  else if(!currentUserId){ openWhoAreYou(); }
  render();

  startRealtimeSync();
  maybeFireDeviceAlert();
  setInterval(maybeFireDeviceAlert, 5*60*1000);
}

/* ---------- IN-APP NOTIFICATIONS ----------
   Important constraint: this board is a self-contained web page, not an installed iPhone
   app, so it cannot push real notifications to a phone while the page is closed. What it
   CAN do: surface "what changed" prominently whenever someone opens the board, track what
   each person has already seen, and — only while the page happens to be open in a browser —
   fire a best-effort on-device browser notification. */
function getNotifications(){
  if(!currentUserId) return [];
  if(!state.notifSeen) state.notifSeen = {};
  const seen = state.notifSeen[currentUserId] || { weekIndex:null, eventKeys:[] };
  const notifs = [];
  if(state.weeklyRotation){
    const per = weeklyPlanPeriod(state.weeklyRotation);
    if(seen.weekIndex === null || seen.weekIndex === undefined || seen.weekIndex < per.weekIndex){
      notifs.push({ kind:'chore', id:`week-${per.weekIndex}`, weekIndex: per.weekIndex,
        text:`Chores rotated for the week of ${fmtDate(per.periodStart)} — check who's up.` });
    }
  }
  state.events.filter(canSeeEvent).forEach(e=>{
    const days = daysUntil(e.date, e.type==='birthday');
    if(days>=0 && days<=3){
      let occDate = e.date;
      if(e.type==='birthday'){
        const now = new Date(); now.setHours(0,0,0,0);
        let t = new Date(e.date+'T00:00:00'); t.setFullYear(now.getFullYear());
        if(t<now) t.setFullYear(now.getFullYear()+1);
        occDate = isoDate(t);
      }
      const key = `${e.id}-${occDate}`;
      if(!(seen.eventKeys||[]).includes(key)){
        const when = days===0?'is today':days===1?'is tomorrow':`is in ${days} days`;
        notifs.push({ kind:'event', id:key, eventKey:key, text:`${e.title} ${when}.` });
      }
    }
  });
  return notifs;
}
function markNotifSeen(n){
  if(!currentUserId) return;
  if(!state.notifSeen) state.notifSeen = {};
  if(!state.notifSeen[currentUserId]) state.notifSeen[currentUserId] = { weekIndex:null, eventKeys:[] };
  const rec = state.notifSeen[currentUserId];
  if(n.kind==='chore'){ rec.weekIndex = n.weekIndex; }
  else { rec.eventKeys = rec.eventKeys || []; if(!rec.eventKeys.includes(n.eventKey)) rec.eventKeys.push(n.eventKey); }
}
function openNotificationsModal(){
  const notifs = getNotifications();
  const wrap = document.createElement('div');
  wrap.className='overlay';
  wrap.innerHTML = `
    <div class="modal">
      <h3>What's new</h3>
      ${notifs.length===0 ? `<div class="empty">You're all caught up.</div>` : notifs.map(n=>`
        <div class="row">
          <span class="tag ${n.kind==='chore'?'today':'event'}">${n.kind==='chore'?'🔄':'📅'}</span>
          <div class="row-main row-sub">${escapeHtml(n.text)}</div>
          <button class="icon-btn" data-ack="${n.id}">Got it</button>
        </div>
      `).join('')}
      <p style="font-size:12px;color:var(--ink-soft);margin-top:14px;">This board can't send alerts to your phone while it's closed — that needs a real installed app. For the closest thing on iPhone: open this page in Safari, tap Share, then "Add to Home Screen" so it sits on your homescreen like an app. While this tab is open, you can also turn on best-effort on-device alerts below.</p>
      <div id="notifPermRow" style="margin-top:10px;"></div>
      <div class="modal-actions">
        ${notifs.length>0?`<button class="btn ghost" id="ackAll">Mark all as read</button>`:''}
        <button class="btn" id="closeNotif">Close</button>
      </div>
    </div>`;
  document.body.appendChild(wrap);

  const permRow = wrap.querySelector('#notifPermRow');
  function renderPermRow(){
    if(typeof Notification === 'undefined'){
      permRow.innerHTML = `<p style="font-size:12px;color:var(--ink-soft);">This browser doesn't support on-device alerts.</p>`;
    } else if(Notification.permission === 'granted'){
      permRow.innerHTML = `<p style="font-size:12.5px;color:var(--green);">✓ On-device alerts are on for this browser.</p>`;
    } else if(Notification.permission === 'denied'){
      permRow.innerHTML = `<p style="font-size:12px;color:var(--ink-soft);">Alerts are blocked for this site in your browser settings.</p>`;
    } else {
      permRow.innerHTML = `<button class="btn ghost" id="enableNotifBtn">Enable on-device alerts</button>`;
      permRow.querySelector('#enableNotifBtn').onclick = ()=>{
        Notification.requestPermission().then(renderPermRow);
      };
    }
  }
  renderPermRow();

  wrap.querySelector('#closeNotif').onclick = ()=>{ document.body.removeChild(wrap); renderMembersRow(); };
  const ackAllBtn = wrap.querySelector('#ackAll');
  if(ackAllBtn) ackAllBtn.onclick = ()=>{
    notifs.forEach(markNotifSeen);
    saveState();
    document.body.removeChild(wrap);
    renderMembersRow();
  };
  wrap.querySelectorAll('[data-ack]').forEach(btn=>{
    btn.onclick = ()=>{
      const n = notifs.find(x=>x.id===btn.dataset.ack);
      if(n) markNotifSeen(n);
      saveState();
      btn.closest('.row').remove();
      renderMembersRow();
    };
  });
}

/* Best-effort on-device alert — only fires if this tab happens to be open at the time,
   and only on the device where alerts were enabled. Not a substitute for real push. */
function maybeFireDeviceAlert(){
  if(typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
  if(!state.weeklyRotation) return;
  const now = new Date();
  if(now.getDay() !== 0 || now.getHours() < 12) return; // Sunday, after 12:00
  let lastFired = null;
  try{ lastFired = localStorage.getItem('house-board-last-alert'); }catch(e){}
  if(lastFired === todayStr()) return;
  new Notification('Prolific', { body: "It's Sunday — chores have rotated for the new week." });
  try{ localStorage.setItem('house-board-last-alert', todayStr()); }catch(e){}
}

function weeksBetween(a,b){
  const ms = new Date(b+'T00:00:00') - new Date(a+'T00:00:00');
  return Math.floor(ms/(7*86400000));
}
function isoDate(d){ return d.toISOString().slice(0,10); }
function isoWeekKey(d){
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = (date.getUTCDay()+6)%7;
  date.setUTCDate(date.getUTCDate()-dayNum+3);
  const firstThursday = new Date(Date.UTC(date.getUTCFullYear(),0,4));
  const weekNum = 1 + Math.round(((date-firstThursday)/86400000 - 3 + ((firstThursday.getUTCDay()+6)%7))/7);
  return `${date.getUTCFullYear()}-W${String(weekNum).padStart(2,'0')}`;
}

/* ---------- STRICT WEEKLY STREAK ----------
   A "perfect week" means every chore due that week, for that member, got done.
   Rotating-chore due weeks are fully reconstructable from the anchor/interval math for
   any past date. Fixed-chore due weeks are read from the chore's CURRENT dueDate, which
   is only reliable for the week it's currently sitting on — so we score each completed
   week once, the first time it's seen, and freeze the result rather than recomputing it
   forever (avoids a fixed chore's later, rolled-forward dueDate retroactively rewriting
   whether an earlier week looked "perfect"). */
function isoWeekRange(weekKey){
  const [yearStr, wStr] = weekKey.split('-W');
  const year = parseInt(yearStr,10), week = parseInt(wStr,10);
  const jan4 = new Date(Date.UTC(year,0,4));
  const jan4Day = (jan4.getUTCDay()+6)%7;
  const week1Monday = new Date(jan4); week1Monday.setUTCDate(jan4.getUTCDate()-jan4Day);
  const monday = new Date(week1Monday); monday.setUTCDate(week1Monday.getUTCDate() + (week-1)*7);
  const sunday = new Date(monday); sunday.setUTCDate(monday.getUTCDate()+6);
  return { monday, sunday };
}
function weekIndex(weekKey){
  return Math.floor(isoWeekRange(weekKey).monday.getTime() / (7*86400000));
}
function bestStreakEver(memberId){
  const entries = state.weeklyScorecard.filter(s=>s.memberId===memberId)
    .map(s=>({ idx: weekIndex(s.weekKey), perfect: s.perfect }))
    .sort((a,b)=> a.idx-b.idx);
  let best=0, cur=0, prevIdx=null;
  entries.forEach(e=>{
    if(e.perfect){
      cur = (prevIdx!==null && e.idx===prevIdx+1) ? cur+1 : 1;
      best = Math.max(best, cur);
    } else {
      cur = 0;
    }
    prevIdx = e.idx;
  });
  return best;
}

}
function streakRiskInfo(memberId){
  const dow = (new Date().getDay()+6)%7; // Mon=0..Sun=6
  if(dow < 4) return null; // only worth nudging from Friday onward
  const wk = isoWeekKey(new Date());
  const due = choresDueInWeek(wk).filter(x=>x.assigneeIds.includes(memberId));
  if(due.length===0) return null;
  const notDone = due.filter(x=> !state.xpLog.some(e=>e.memberId===memberId && e.source==='chore' && e.weekKey===wk && e.meta && e.meta.choreId===x.chore.id));
  if(notDone.length===0) return null;
  return { notDone, daysLeft: 6-dow };
}
function recapData(days){
  const since = Date.now() - days*86400000;
  return visibleMembers().map(m=>{
    const entries = state.xpLog.filter(e=>e.memberId===m.id && e.at>=since);
    return { member:m, xp: entries.reduce((s,e)=>s+e.xp,0), count: entries.length };
  }).sort((a,b)=> b.xp-a.xp);
}
let recapPeriod = 'week';
function choresDueInWeek(weekKey){
  const { monday, sunday } = isoWeekRange(weekKey);
  const due = [];
  state.chores.forEach(ch=>{
    if(ch.type==='rotating'){
      // use the period that contains the END of this calendar week as the reference —
      // rotation periods aren't necessarily Monday-aligned, so we check the period's
      // actual end date against this week's real date range rather than comparing week keys.
      const st = rotationStatusAt(ch, isoDate(sunday));
      if(st.needsSetup) return;
      const periodEndDate = new Date(st.periodEnd+'T00:00:00Z');
      if(periodEndDate >= monday && periodEndDate <= sunday){
        due.push({ chore:ch, assigneeIds: st.turnMembers||[] });
      }
    } else if(ch.type==='fixed'){
      if(!ch.assignee) return;
      const dueDate = new Date(ch.dueDate+'T00:00:00Z');
      if(dueDate >= monday && dueDate <= sunday){
        due.push({ chore:ch, assigneeIds:[ch.assignee] });
      }
    }
  });
  return due;
}
function scoreCompletedWeeks(){
  state.weeklyScorecard = state.weeklyScorecard || [];
  const currentWeek = isoWeekKey(new Date());
  let changed = false;
  state.members.forEach(m=>{
    for(let i=1;i<=12;i++){
      const d = new Date(); d.setDate(d.getDate() - 7*i);
      const wk = isoWeekKey(d);
      if(wk===currentWeek) continue;
      if(state.weeklyScorecard.some(s=>s.memberId===m.id && s.weekKey===wk)) break; // already scored, and weeks are scored contiguously
      const due = choresDueInWeek(wk).filter(x=>x.assigneeIds.includes(m.id));
      if(due.length===0) continue; // nothing assigned that week — neutral, don't record, don't break the chain
      const perfect = due.every(x=> state.xpLog.some(e=>e.memberId===m.id && e.source==='chore' && e.weekKey===wk && e.meta && e.meta.choreId===x.chore.id));
      state.weeklyScorecard.push({ id:uid(), memberId:m.id, weekKey:wk, perfect, dueCount:due.length });
      changed = true;
    }
  });
  return changed;
}
function strictStreak(memberId){
  const currentWeek = isoWeekKey(new Date());
  let streak = 0;
  for(let i=1;i<=52;i++){
    const d = new Date(); d.setDate(d.getDate() - 7*i);
    const wk = isoWeekKey(d);
    if(wk===currentWeek) continue;
    const entry = state.weeklyScorecard.find(s=>s.memberId===memberId && s.weekKey===wk);
    if(!entry) continue; // neutral week (nothing due) — bridge over it, doesn't break the streak
    if(!entry.perfect) break;
    streak++;
  }
  return streak;
}
function streakTierFor(weeks){
  return STREAK_TIERS.find(t=> weeks>=t.weeks) || null;
}
/* ---------- TAMAGOTCHI PET ----------
   Each housemate has their own pet that actually behaves like a Tamagotchi:
   hunger/happiness/energy decay continuously over real time (computed from
   timestamps, so it keeps "living" even while the app is closed), it can be
   put to sleep, it can get sick or make a mess, and there are two mini-games
   to play with it. Real productivity stakes are preserved: a neglected pet
   caps your streak bonus at ×1.0; a sick pet cuts your earned XP in half,

function petArtFor(stageKey, isSick){
  if(stageKey==='egg') return PET_IMAGES.egg;
  if(stageKey==='baby') return PET_IMAGES.baby;
  if(stageKey==='adult' && !isSick) return PET_IMAGES.hero;
  return null; // teen stage, and sick/dark adult, fall back to the generated SVG for now
}
function ensurePet(member){
  const now = Date.now();
  if(!member.pet){
    const past = now - 2*86400000; // a couple days of starting "buffer" so care is needed but not urgent immediately
    member.pet = {
      name: null, createdAt: now,
      lastFed: past, lastHappy: past, lastPlayed: past, lastCleaned: past,
      isSleeping: false, sleepToggledAt: now,
      energy: 80, energyUpdatedAt: now,
      health: 100, healthUpdatedAt: now,
    };
    return;
  }
  // migrate any older/partial pet records up to the full schema
  const p = member.pet;
  if(typeof p.lastHappy !== 'number') p.lastHappy = p.lastPlayed || now - 2*86400000;
  if(typeof p.lastPlayed !== 'number') p.lastPlayed = p.lastHappy;
  if(typeof p.lastCleaned !== 'number') p.lastCleaned = p.createdAt || now;
  if(typeof p.isSleeping !== 'boolean') p.isSleeping = false;
  if(typeof p.sleepToggledAt !== 'number') p.sleepToggledAt = now;
  if(typeof p.energy !== 'number') p.energy = 80;
  if(typeof p.energyUpdatedAt !== 'number') p.energyUpdatedAt = now;
  if(typeof p.health !== 'number') p.health = 100;
  if(typeof p.healthUpdatedAt !== 'number') p.healthUpdatedAt = now;
}
function isSameCalendarDay(t1,t2){ return new Date(t1).toDateString() === new Date(t2).toDateString(); }

function computeHunger(member){ return clampPct(100 - hrsSince(member.pet.lastFed)*PET_HUNGER_DECAY_PER_HR); }
function computeHappiness(member){ return clampPct(100 - hrsSince(member.pet.lastHappy)*PET_HAPPY_DECAY_PER_HR); }
function computeMess(member){ return hrsSince(Math.max(member.pet.lastFed, member.pet.lastCleaned)) > PET_MESS_THRESHOLD_HRS; }

// Pulls energy/health forward to "now" based on elapsed real time. Safe to call
// often (purely in-memory) — only persisted when an actual care action saves state.
function tickPet(member){
  ensurePet(member);
  const p = member.pet;
  const now = Date.now();

  const hrsEnergy = hrsSince(p.energyUpdatedAt);
  p.energy = p.isSleeping
    ? clampPct(p.energy + hrsEnergy*PET_ENERGY_RECOVER_PER_HR)
    : clampPct(p.energy - hrsEnergy*PET_ENERGY_DRAIN_PER_HR);
  p.energyUpdatedAt = now;

  const hunger = computeHunger(member);
  const happiness = computeHappiness(member);
  const neglected = hunger < 20 || happiness < 20 || computeMess(member);
  const hrsHealth = hrsSince(p.healthUpdatedAt);
  p.health = neglected
    ? clampPct(p.health - hrsHealth*PET_HEALTH_DECAY_PER_HR)
    : clampPct(p.health + hrsHealth*PET_HEALTH_REGEN_PER_HR);
  p.healthUpdatedAt = now;
}

// Backward-compatible: used by the productivity-side XP penalty system.
function petStats(member){
  ensurePet(member);
  return { hunger: computeHunger(member), happiness: computeHappiness(member) };
}
// Full live stats for the rich pet widget. Mutates in-memory decay (tickPet)
// but does not itself persist — callers that change state should saveState().
function petFullStats(member){
  ensurePet(member);
  tickPet(member);
  const hunger = computeHunger(member);
  const happiness = computeHappiness(member);
  const energy = clampPct(member.pet.energy);
  const health = clampPct(member.pet.health);
  const hasMess = computeMess(member);
  const isSick = health < 40;
  return { hunger, happiness, energy, health, hasMess, isSick, isSleeping: member.pet.isSleeping };
}
function petCareCount(memberId){
  return state.xpLog.filter(e=>e.memberId===memberId && (e.source==='pet_feed'||e.source==='pet_play'||e.source==='pet_clean')).length;
}
function petStage(careCount){
  if(careCount<5) return { key:'egg', label:'Egg' };
  if(careCount<15) return { key:'baby', label:'Baby' };
  if(careCount<40) return { key:'teen', label:'Teen' };
  return { key:'adult', label:'Adult' };
}
function petMoodInfo(member){
  const { hunger, happiness } = petStats(member);
  const min = Math.min(hunger, happiness);
  let mood, label;
  if(min>=60){ mood='happy'; label='Happy'; }
  else if(min>=30){ mood='okay'; label='Doing okay'; }
  else if(min>=10){ mood='neglected'; label='Neglected'; }
  else { mood='sick'; label='Sick'; }
  return { hunger, happiness, mood, label };
}
function petMoodPenalty(memberId){
  const m = memberById(memberId);
  if(!m) return 1;
  const { mood } = petMoodInfo(m);
  if(mood==='sick') return 0.5;     // real XP cut
  if(mood==='neglected') return 'cap1'; // signal to cap streak bonus at 1.0, handled in streakMultiplier
  return 1;
}
function canFeedToday(member){ ensurePet(member); return !isSameCalendarDay(member.pet.lastFed, Date.now()); }
function canPlayToday(member){ ensurePet(member); return !isSameCalendarDay(member.pet.lastPlayed, Date.now()); }
function canCleanToday(member){ ensurePet(member); return !isSameCalendarDay(member.pet.lastCleaned, Date.now()); }
function isPetHatched(memberId){ return petCareCount(memberId) >= EVOS_TO_HATCH; }

// Feeding always resets hunger (so the pet always responds to care), but the
// XP/evolution reward is capped once per day to keep the chore economy fair.
function feedPet(memberId){
  const m = memberById(memberId); if(!m) return;
  ensurePet(m); tickPet(m);
  const rewarded = canFeedToday(m);
  m.pet.lastFed = Date.now();
  if(rewarded) logXP(memberId, 'pet_feed', 'Fed pet', XP.petFeed);
  saveState(); render();
}
// "Play" opens the mini-game menu (pure UI state, no save needed) —
// happiness/evolution/XP are granted on the mini-game result, see below.
let petUI = { ownerId: null, menuOpen: false, activeGame: null, gameStartedAt: 0, starCardIndex: 0, revealed: false };
function openPetPlayMenu(memberId){
  const m = memberById(memberId); if(!m) return;
  ensurePet(m);
  if(m.pet.isSleeping) return;
  if(petUI.ownerId===memberId && (petUI.menuOpen || petUI.activeGame)){ closePetPlayMenu(); return; }
  tickPet(m); // keep displayed stats fresh while we're at it (in-memory only)
  petUI = { ownerId: memberId, menuOpen: true, activeGame: null, gameStartedAt: 0, starCardIndex: 0, revealed: false };
  render();
}
function startPetGame(type){
  if(!petUI.ownerId) return;
  petUI.activeGame = type;
  petUI.gameStartedAt = Date.now();
  petUI.revealed = false;
  petUI.starCardIndex = Math.floor(Math.random()*3);
  render();
}
function closePetPlayMenu(){
  petUI = { ownerId: null, menuOpen: false, activeGame: null, gameStartedAt: 0, starCardIndex: 0, revealed: false };
  render();
}
// Timing mini-game: the bar's position is derived purely from elapsed time
// (matching the CSS animation period below), so no setInterval/polling is
// needed and nothing breaks if the page re-renders mid-game.
function petTapNow(){
  if(!petUI.ownerId || petUI.activeGame!=='timing') return;
  const memberId = petUI.ownerId;
  const period = 1700; // ms, must match .minigame-moving-bar animation-duration
  const elapsed = Date.now() - petUI.gameStartedAt;
  const t = elapsed % (period*2);
  const pos = t < period ? (t/period)*97 : ((period*2 - t)/period)*97; // 0..97, mirrors barSweep keyframes
  const success = pos >= 68 && pos <= 85; // matches .minigame-target-zone (left:68%, width:17%)
  resolvePetMinigame(memberId, success);
}
function petPickCard(idx){
  if(!petUI.ownerId || petUI.activeGame!=='card' || petUI.revealed) return;
  const memberId = petUI.ownerId;
  const success = idx === petUI.starCardIndex;
  petUI.revealed = true;
  render();
  setTimeout(()=> resolvePetMinigame(memberId, success), 1100);
}
function resolvePetMinigame(memberId, success){
  const m = memberById(memberId); if(!m) return;
  ensurePet(m); tickPet(m);
  const rewarded = canPlayToday(m);
  m.pet.lastPlayed = Date.now();
  if(success){
    m.pet.lastHappy = Date.now();
    m.pet.energy = clampPct(m.pet.energy - 8);
  } else {
    m.pet.energy = clampPct(m.pet.energy - 12);
  }
  if(rewarded) logXP(memberId, 'pet_play', 'Played with pet', XP.petPlay);
  petUI = { ownerId: null, menuOpen: false, activeGame: null, gameStartedAt: 0, starCardIndex: 0, revealed: false };
  saveState(); render();
}
// A quick affectionate pat — small, frequent happiness top-up, no XP (so it
// can't be spam-clicked for free reward), just genuine pet care.
function pettingPet(memberId){
  const m = memberById(memberId); if(!m) return;
  if(m.pet && m.pet.isSleeping) return;
  ensurePet(m); tickPet(m);
  m.pet.lastHappy = Date.now();
  saveState(); render();
}
function sleepPet(memberId){
  const m = memberById(memberId); if(!m) return;
  ensurePet(m); tickPet(m); // settle energy at current state before flipping the clock
  m.pet.isSleeping = !m.pet.isSleeping;
  m.pet.sleepToggledAt = Date.now();
  saveState(); render();
}
function cleanPet(memberId){
  const m = memberById(memberId); if(!m) return;
  ensurePet(m); tickPet(m);
  if(!computeMess(m)) return;
  const rewarded = canCleanToday(m);
  m.pet.lastCleaned = Date.now();
  m.pet.lastHappy = Date.now();
  if(rewarded) logXP(memberId, 'pet_clean', 'Cleaned up after pet', XP.petClean);
  saveState(); render();
}
function healPet(memberId){
  const m = memberById(memberId); if(!m) return;
  ensurePet(m); tickPet(m);
  if(m.pet.health >= 40) return; // only needed once actually sick

function choreXPValue(ch){

function rotationStatusAt(ch, dateStr){
  const r = ch.rotation;
  if(!r.turns || r.turns.length===0){
    return { periodIndex:0, cycleNumber:0, turnMembers:[], periodStart:dateStr, periodEnd:dateStr, needsSetup:true };
  }
  const weeksSince = weeksBetween(r.anchorDate, dateStr);
  const totalWeeksPerCycle = r.intervalWeeks * r.turns.length;
  const safeWeeksSince = Math.max(weeksSince, 0);
  const cycleNumber = Math.floor(safeWeeksSince / totalWeeksPerCycle);
  const cyclePos = safeWeeksSince % totalWeeksPerCycle;
  const periodIndex = Math.floor(cyclePos / r.intervalWeeks);
  const periodStartWeeks = cycleNumber*totalWeeksPerCycle + periodIndex*r.intervalWeeks;
  const periodStart = new Date(r.anchorDate+'T00:00:00');
  periodStart.setDate(periodStart.getDate() + periodStartWeeks*7);
  const periodEnd = new Date(periodStart); periodEnd.setDate(periodEnd.getDate() + r.intervalWeeks*7 - 1);
  const key = `${cycleNumber}-${periodIndex}`;
  const baseMembers = r.turns[periodIndex] || [];
  const turnMembers = (ch.periodOverrides && ch.periodOverrides[key]) ? ch.periodOverrides[key] : baseMembers;
  return { periodIndex, cycleNumber, key, turnMembers, periodStart: isoDate(periodStart), periodEnd: isoDate(periodEnd) };
}

function weeklyPlanWeekIndex(plan){
  const w = weeksBetween(plan.anchorDate, todayStr());

}
function weeklyPlanPeriod(plan){
  const w = weeklyPlanWeekIndex(plan);
  const start = new Date(plan.anchorDate+'T00:00:00'); start.setDate(start.getDate()+w*7);
  const end = new Date(start); end.setDate(end.getDate()+6);
  return { weekIndex:w, periodStart: isoDate(start), periodEnd: isoDate(end) };
}
function weeklyPlanSlice(plan, roleIdx, choreId){
  const N = plan.order.length;
  if(N===0) return [];
  const w = weeklyPlanWeekIndex(plan);
  const shift = w % N;
  const rotated = plan.order.slice(shift).concat(plan.order.slice(0, shift));
  let offset = 0;
  for(let i=0;i<roleIdx;i++) offset += plan.roles[i].slots;
  const baseSlice = rotated.slice(offset, offset + plan.roles[roleIdx].slots);
  if(choreId){
    const ch = state.chores.find(c=>c.id===choreId);
    if(ch && ch.weekOverrides && ch.weekOverrides[w]) return ch.weekOverrides[w];
  }
  return baseSlice;
}
function isChoreDone(ch){

        <div class="chip-select" id="swapChips">
          ${available.map(m=>`<div class="chip" data-id="${m.id}" style="border-color:${m.color}">${escapeHtml(m.name)}</div>`).join('')}
        </div>
      </div>
      <div class="modal-actions"><button class="btn ghost" id="cancelSwap">Close</button></div>
    `;
    wrap.querySelector('#cancelSwap').onclick = ()=> document.body.removeChild(wrap);
    const assignChips = wrap.querySelector('#assignChips');
    if(assignChips) assignChips.querySelectorAll('.chip').forEach(chip=>{
      chip.onclick = ()=>{ applySwap(0, chip.dataset.id); document.body.removeChild(wrap); render(); };
    });
    wrap.querySelectorAll('[data-swapslot]').forEach(btn=>{
      btn.onclick = ()=>{
        const slotIdx = +btn.dataset.swapslot;
        const pickWrap = wrap.querySelector('#swapPickWrap');
        pickWrap.style.display = 'block';
        pickWrap.querySelectorAll('.chip').forEach(chip=>{
          chip.onclick = ()=>{
            applySwap(slotIdx, chip.dataset.id);
            document.body.removeChild(wrap);
            render();
          };
        });
      };
    });
  }
  renderBody();
}

function eventRow(e){
  const days = e._days!==undefined? e._days : daysUntil(e.date, e.type==='birthday');
  const label = days===0?'Today':days===1?'Tomorrow':(days>=0?`in ${days}d`:'');
  const importer = e.source==='google' ? memberById(e.importedBy) : null;
  let visLabel = '';
  if(e.visibility==='private') visLabel = ' · 🔒 Private';
  else if(e.visibility==='selected') visLabel = ' · 👥 Shared';
  return `
  <div class="row">
    <span class="tag ${e.type}">${e.type==='birthday'?'🎂':'📌'}</span>
    <div class="row-main">
      <div class="row-title">${escapeHtml(e.title)}</div>
      <div class="row-sub">${fmtDate(e.date)}${label?' · '+label:''}${importer?` · via ${escapeHtml(importer.name)}'s Google Calendar`:''}${visLabel}</div>
    </div>
    <button class="icon-btn" data-action="delete-event" data-id="${e.id}">✕</button>
  </div>`;
}
function reminderNote(r){
  const from = memberById(r.from);

  return `
  <div class="note ${r.done?'done':''}">

      <span>${from?escapeHtml(from.name):'?'} → ${escapeHtml(to)}</span>

}

/* ---------- CHORES TAB ---------- */
let choreSubTab = 'all';
function choreCadence(ch){
  if(ch.type==='rotating'){
    if(ch.rotation.intervalWeeks===1) return 'weekly';
    if(ch.rotation.intervalWeeks===2) return 'biweekly';
    return 'other';
  }
  if(ch.type==='fixed'){
    return ch.frequency==='weekly' ? 'weekly' : 'other';
  }
  if(ch.type==='linked'){
    return 'weekly'; // the "no-overlaps" weekly rotation system is inherently weekly
  }
  return 'other';
}
function renderChores(){
  const sorted = [...state.chores].sort((a,b)=>{
    const da = isChoreDone(a), db = isChoreDone(b);
    if(da!==db) return da?1:-1;
    return effectiveDate(a).localeCompare(effectiveDate(b));
  });
  const counts = { all: sorted.length, weekly:0, biweekly:0, other:0 };
  sorted.forEach(c=> counts[choreCadence(c)]++);
  const filtered = choreSubTab==='all' ? sorted : sorted.filter(c=>choreCadence(c)===choreSubTab);
  const subTabDef = [
    {key:'all', label:'All'},
    {key:'weekly', label:'Weekly'},
    {key:'biweekly', label:'Biweekly'},
    {key:'other', label:'Other'},
  ];
  return `
    <div class="card">
      <h3>Chores</h3>
      <p style="font-size:13px;color:var(--ink-soft);margin:-4px 0 10px;">Set chores to a fixed person and schedule, have them rotate on their own, or link several together into one weekly rotation so nobody ever does two chores in the same week.</p>
      <button class="btn" data-action="open-chore-modal">+ Add a chore</button>
      <button class="btn ghost" data-action="open-quick-task" style="margin-left:8px;">📌 Assign a task</button>
      <button class="btn ghost" data-action="open-weekly-rotation" style="margin-left:8px;">${state.weeklyRotation?'Edit weekly rotation':'Set up weekly rotation (no overlaps)'}</button>
    </div>
    <div class="card">
      <h3>All chores</h3>
      <div class="chip-select" style="margin-bottom:12px;">
        ${subTabDef.filter(t=>t.key==='all'||t.key==='weekly'||t.key==='biweekly'||counts.other>0).map(t=>`
          <span class="chip ${choreSubTab===t.key?'active':''}" data-action="chore-subtab" data-subtab="${t.key}" style="${choreSubTab===t.key?'background:var(--green);border-color:transparent;color:#fff;':''}">${t.label} (${counts[t.key]})</span>
        `).join('')}
      </div>
      ${filtered.length===0?`<div class="empty">${choreSubTab==='all'?'No chores yet — add one above.':'Nothing in this view yet.'}</div>`:filtered.map(choreRow).join('')}
    </div>
  `;
}

    <div class="modal">
      <h3>${isEdit?'Edit chore':'Add a chore'}</h3>
      <div class="form-grid">
        <div><label>Chore</label><input id="mTitle" placeholder="e.g. Vacuum living room" value="${isEdit?escapeHtml(existing.title):''}"></div>
        <div><label>Type</label>
          <select id="mType">
            <option value="fixed" ${isEdit && existing.type==='fixed'?'selected':''}>One person, set schedule</option>
            <option value="rotating" ${isEdit && existing.type==='rotating'?'selected':''}>Rotates between housemates</option>
          </select>
        </div>
      </div>
      <div id="fixedFields">
        <div class="form-row">
          <div><label>Assign to</label>
            <select id="mAssignee"><option value="">Unassigned</option>${state.members.filter(m=>!m.hidden || (isEdit && existing.type==='fixed' && existing.assignee===m.id)).map(m=>`<option value="${m.id}" ${isEdit && existing.type==='fixed' && existing.assignee===m.id?'selected':''}>${escapeHtml(m.name)}${m.hidden?' (hidden)':''}</option>`).join('')}</select>
          </div>
          <div><label>Frequency</label>
            <select id="mFrequency">
              <option value="one-time" ${isEdit && existing.frequency==='one-time'?'selected':''}>One-time</option>
              <option value="daily" ${isEdit && existing.frequency==='daily'?'selected':''}>Daily</option>
              <option value="weekly" ${isEdit && existing.frequency==='weekly'?'selected':''}>Weekly</option>
              <option value="monthly" ${isEdit && existing.frequency==='monthly'?'selected':''}>Monthly</option>
            </select>
          </div>
          <div><label>Due date</label><input id="mDue" type="date" value="${isEdit && existing.type==='fixed' ? existing.dueDate : todayStr()}"></div>
        </div>
      </div>
      <div id="rotatingFields" style="display:none;">
        <div class="form-row">
          <div><label>Repeats every</label>
            <select id="mInterval">
              <option value="1" ${isEdit && existing.type==='rotating' && existing.rotation.intervalWeeks===1?'selected':''}>1 week</option>
              <option value="2" ${isEdit && existing.type==='rotating' && existing.rotation.intervalWeeks===2?'selected':''}>2 weeks</option>
              <option value="3" ${isEdit && existing.type==='rotating' && existing.rotation.intervalWeeks===3?'selected':''}>3 weeks</option>
              <option value="4" ${isEdit && existing.type==='rotating' && existing.rotation.intervalWeeks===4?'selected':''}>4 weeks</option>
            </select>
          </div>
          <div><label>Starting</label><input id="mAnchor" type="date" value="${isEdit && existing.type==='rotating' ? existing.rotation.anchorDate : todayStr()}"></div>
        </div>
        <label style="margin-top:6px;">Turn order — this is the order housemates take the chore, on repeat</label>
        <div id="turnsContainer"></div>
        <button class="btn ghost" id="addTurnBtn" style="margin-top:2px;">+ Add turn</button>
        <p style="font-size:12px;color:var(--ink-soft);margin-top:8px;">Each turn lasts one interval, then it moves to the next. Use ↑ / ↓ to reorder. Leave someone out of every turn to exclude them. Put more than one person in a turn to assign that turn to a group together.</p>
        <div class="section-label" style="margin-top:14px;">Schedule preview</div>
        <div id="turnPreview"></div>
      </div>
      <div id="choreError" class="error-text" style="display:none;"></div>
      <div class="modal-actions">
        ${isEdit?`<button class="btn ghost" id="deleteChoreBtn" style="color:var(--danger);border-color:var(--danger);">Delete</button>`:''}
        <button class="btn ghost" id="cancelChore">Cancel</button>
        <button class="btn" id="saveChore">${isEdit?'Save changes':'Add chore'}</button>
      </div>
    </div>`;
  document.body.appendChild(wrap);

  modalTurns = (isEdit && existing.type==='rotating') ? existing.rotation.turns.map(t=>[...t]) : [[]];

  function renderPreview(){
    const previewEl = wrap.querySelector('#turnPreview');
    const turns = modalTurns.filter(t=>t.length>0);
    if(turns.length===0){ previewEl.innerHTML = `<div class="empty" style="padding:6px 4px;">Add people to a turn to preview the schedule.</div>`; return; }
    const intervalWeeks = parseInt(wrap.querySelector('#mInterval').value,10);
    const anchor = wrap.querySelector('#mAnchor').value || todayStr();
    let rows = '';
    for(let i=0;i<Math.min(turns.length,6);i++){
      const start = new Date(anchor+'T00:00:00'); start.setDate(start.getDate()+i*intervalWeeks*7);
      const end = new Date(start); end.setDate(end.getDate()+intervalWeeks*7-1);
      const names = turns[i].map(id=>memberById(id)?.name||'?').join(' & ');
      rows += `<div class="row" style="padding:6px 2px;">
        <span class="tag event">${fmtDate(isoDate(start))}–${fmtDate(isoDate(end))}</span>
        <div class="row-main row-sub">${escapeHtml(names)}</div>
      </div>`;
    }
    previewEl.innerHTML = rows + `<div style="font-size:11.5px;color:var(--ink-soft);margin-top:4px;">Then repeats from turn 1 again.</div>`;
  }

  function renderTurns(){
    const cont = wrap.querySelector('#turnsContainer');
    cont.innerHTML = modalTurns.map((turn,i)=>`
      ${i>0?`<div style="text-align:center;color:var(--ink-soft);font-size:12px;margin:-2px 0 4px;">↓ then</div>`:''}
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
        <span style="font-size:12px;font-weight:700;color:var(--ink);width:54px;flex:none;">Turn ${i+1}</span>
        <div class="chip-select" style="flex:1;">
          ${state.members.filter(m=>!m.hidden || turn.includes(m.id)).map(m=>`<div class="chip turn-chip ${turn.includes(m.id)?'active':''}" data-turn="${i}" data-id="${m.id}" style="${turn.includes(m.id)?`background:${m.color};border-color:${m.color}`:''}">${escapeHtml(m.name)}${m.hidden?' (hidden)':''}</div>`).join('')}
        </div>
        <button class="icon-btn" data-moveup="${i}" ${i===0?'disabled':''} style="${i===0?'opacity:.25;cursor:default;':''}">↑</button>
        <button class="icon-btn" data-movedown="${i}" ${i===modalTurns.length-1?'disabled':''} style="${i===modalTurns.length-1?'opacity:.25;cursor:default;':''}">↓</button>
        ${modalTurns.length>1?`<button class="icon-btn" data-removeturn="${i}">✕</button>`:''}
      </div>
    `).join('');
    cont.querySelectorAll('.turn-chip').forEach(chip=>{
      chip.onclick = ()=>{
        const ti = +chip.dataset.turn, mid = chip.dataset.id;
        const turn = modalTurns[ti];
        const idx = turn.indexOf(mid);
        if(idx>=0) turn.splice(idx,1); else turn.push(mid);
        renderTurns();
      };
    });
    cont.querySelectorAll('[data-moveup]:not([disabled])').forEach(btn=>{
      btn.onclick = ()=>{ const i=+btn.dataset.moveup; [modalTurns[i-1],modalTurns[i]]=[modalTurns[i],modalTurns[i-1]]; renderTurns(); };
    });
    cont.querySelectorAll('[data-movedown]:not([disabled])').forEach(btn=>{
      btn.onclick = ()=>{ const i=+btn.dataset.movedown; [modalTurns[i+1],modalTurns[i]]=[modalTurns[i],modalTurns[i+1]]; renderTurns(); };
    });
    cont.querySelectorAll('[data-removeturn]').forEach(btn=>{
      btn.onclick = ()=>{ modalTurns.splice(+btn.dataset.removeturn,1); renderTurns(); };
    });
    renderPreview();
  }
  renderTurns();
  wrap.querySelector('#addTurnBtn').onclick = ()=>{ modalTurns.push([]); renderTurns(); };
  wrap.querySelector('#mInterval').addEventListener('change', renderPreview);
  wrap.querySelector('#mAnchor').addEventListener('change', renderPreview);

  const rotatingInitially = isEdit ? existing.type==='rotating' : false;
  wrap.querySelector('#fixedFields').style.display = rotatingInitially?'none':'block';
  wrap.querySelector('#rotatingFields').style.display = rotatingInitially?'block':'none';
  wrap.querySelector('#mType').onchange = (e)=>{
    const rotating = e.target.value==='rotating';
    wrap.querySelector('#fixedFields').style.display = rotating?'none':'block';
    wrap.querySelector('#rotatingFields').style.display = rotating?'block':'none';
  };

  function showError(msg){ const el = wrap.querySelector('#choreError'); el.textContent = msg; el.style.display='block'; }

  wrap.querySelector('#cancelChore').onclick = ()=> document.body.removeChild(wrap);
  if(isEdit){
    wrap.querySelector('#deleteChoreBtn').onclick = ()=>{
      state.chores = state.chores.filter(x=>x.id!==existing.id);
      saveState(); document.body.removeChild(wrap); render();
    };
  }
  wrap.querySelector('#saveChore').onclick = ()=>{
    const title = wrap.querySelector('#mTitle').value.trim();
    if(!title){ showError('Give the chore a name.'); return; }
    const type = wrap.querySelector('#mType').value;
    let built;
    if(type==='fixed'){
      built = {
        type:'fixed', title,
        assignee: wrap.querySelector('#mAssignee').value || null,
        frequency: wrap.querySelector('#mFrequency').value,
        dueDate: wrap.querySelector('#mDue').value || todayStr(),
        done: (isEdit && existing.type==='fixed') ? existing.done : false
      };
    } else {
      const turns = modalTurns.filter(t=>t.length>0);
      if(turns.length===0){ showError('Add at least one person to at least one turn.'); return; }
      built = {
        type:'rotating', title,
        rotation:{ intervalWeeks: parseInt(wrap.querySelector('#mInterval').value,10), anchorDate: wrap.querySelector('#mAnchor').value || todayStr(), turns },
        doneForPeriod: (isEdit && existing.type==='rotating') ? existing.doneForPeriod : null
      };
    }
    if(isEdit){
      built.id = existing.id;
      const idx = state.chores.findIndex(x=>x.id===existing.id);
      state.chores[idx] = built;
    } else {
      built.id = uid();
      state.chores.push(built);
      logAssignment(currentUserId, type==='rotating' ? XP.setupRotation : XP.assignTask);
    }
    saveState();
    document.body.removeChild(wrap);
    render();
  };
}

      </div>`;

let weeklyOrder = [];
let weeklyRoles = [];

function openWeeklyRotationModal(){
  const plan = state.weeklyRotation;
  weeklyOrder = plan ? [...plan.order] : visibleMembers().map(m=>m.id);
  weeklyRoles = plan ? plan.roles.map(r=>({...r})) : [];

  const wrap = document.createElement('div');
  wrap.className = 'overlay';
  wrap.innerHTML = `
    <div class="modal" style="max-width:560px;">
      <h3>Weekly chore rotation</h3>
      <p style="font-size:13px;color:var(--ink-soft);margin-top:-6px;">Pick which chores rotate together each week and how many people each one needs. Everyone in the rotation order below gets exactly one of these chores a week — nobody doubles up.</p>
      <div class="section-label" style="margin-top:10px;">Chores in this rotation</div>
      <div id="roleList"></div>
      <div class="section-label">Rotation order</div>
      <p style="font-size:12px;color:var(--ink-soft);margin-top:-4px;">Everyone checked gets one role each week. Uncheck anyone who isn't part of the chore rotation — like a housemate's partner who isn't on chore duty — and they'll stay on the board for reminders and the calendar, just not in this rotation. Reorder the rest with ↑ / ↓; the whole order shifts by one person every week.</p>
      <div id="orderList"></div>
      <div class="form-row" style="margin-top:10px;">
        <div><label>Starting</label><input id="wAnchor" type="date" value="${plan?plan.anchorDate:todayStr()}"></div>
      </div>
      <div class="section-label">Preview</div>
      <div id="weeklyPreview"></div>
      <div id="weeklyError" class="error-text" style="display:none;"></div>
      <div class="modal-actions">
        ${plan?`<button class="btn ghost" id="clearPlanBtn" style="color:var(--danger);border-color:var(--danger);">Turn off rotation</button>`:''}
        <button class="btn ghost" id="cancelWeekly">Cancel</button>
        <button class="btn" id="saveWeekly">Save rotation</button>
      </div>
    </div>`;
  document.body.appendChild(wrap);

  function renderRoles(){
    const cont = wrap.querySelector('#roleList');
    const candidates = state.chores.filter(c=> c.type!=='linked' || weeklyRoles.some(r=>r.choreId===c.id));
    if(candidates.length===0){ cont.innerHTML = `<div class="empty" style="padding:6px 4px;">Add some chores first, then come back here to link them.</div>`; return; }
    cont.innerHTML = candidates.map(c=>{
      const role = weeklyRoles.find(r=>r.choreId===c.id);
      const checked = !!role;
      return `<div class="row" style="padding:6px 2px;">
        <input type="checkbox" data-rolechore="${c.id}" ${checked?'checked':''} style="width:auto;flex:none;">
        <div class="row-main row-title" style="font-size:13.5px;">${escapeHtml(c.title)}</div>
        <input type="number" min="1" max="${Math.max(state.members.length,1)}" value="${role?role.slots:1}" data-slotchore="${c.id}" style="width:56px;flex:none;" ${checked?'':'disabled'}>
        <span style="font-size:11.5px;color:var(--ink-soft);flex:none;">people/wk</span>
      </div>`;
    }).join('');
    cont.querySelectorAll('[data-rolechore]').forEach(cb=>{
      cb.onchange = ()=>{
        const id = cb.dataset.rolechore;
        const slotsInput = cont.querySelector(`[data-slotchore="${id}"]`);
        if(cb.checked){
          slotsInput.disabled = false;
          if(!weeklyRoles.some(r=>r.choreId===id)) weeklyRoles.push({choreId:id, slots:parseInt(slotsInput.value,10)||1});
        } else {
          slotsInput.disabled = true;
          weeklyRoles = weeklyRoles.filter(r=>r.choreId!==id);
        }
        renderPreviewWeekly();
      };
    });
    cont.querySelectorAll('[data-slotchore]').forEach(inp=>{
      inp.onchange = ()=>{
        const id = inp.dataset.slotchore;
        const role = weeklyRoles.find(r=>r.choreId===id);
        if(role) role.slots = Math.max(1, parseInt(inp.value,10)||1);
        renderPreviewWeekly();
      };
    });
  }

  function renderOrder(){
    const cont = wrap.querySelector('#orderList');
    if(state.members.length===0){ cont.innerHTML = `<div class="empty" style="padding:6px 4px;">Add housemates first using the + in the header.</div>`; return; }
    const excluded = state.members.filter(m=>!weeklyOrder.includes(m.id) && !m.hidden);
    let html = weeklyOrder.map((mid,i)=>{
      const m = memberById(mid);
      return `<div class="row" style="padding:6px 2px;">
        <input type="checkbox" data-toggleinclude="${mid}" checked style="width:auto;flex:none;">
        ${avatarHtml(m,'sm')}
        <div class="row-main row-title" style="font-size:13.5px;">${m?escapeHtml(m.name):'?'}</div>
        <button class="icon-btn" data-omoveup="${i}" ${i===0?'disabled':''} style="${i===0?'opacity:.25;':''}">↑</button>
        <button class="icon-btn" data-omovedown="${i}" ${i===weeklyOrder.length-1?'disabled':''} style="${i===weeklyOrder.length-1?'opacity:.25;':''}">↓</button>
      </div>`;
    }).join('');
    if(excluded.length>0){
      html += `<div style="font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin:10px 0 4px;">Not in this rotation</div>`;
      html += excluded.map(m=>`<div class="row" style="padding:6px 2px;opacity:.65;">
        <input type="checkbox" data-toggleinclude="${m.id}" style="width:auto;flex:none;">
        ${avatarHtml(m,'sm')}
        <div class="row-main row-title" style="font-size:13.5px;">${escapeHtml(m.name)}</div>
      </div>`).join('');
    }
    cont.innerHTML = html;
    cont.querySelectorAll('[data-toggleinclude]').forEach(cb=>{
      cb.onchange = ()=>{
        const id = cb.dataset.toggleinclude;
        if(cb.checked){ if(!weeklyOrder.includes(id)) weeklyOrder.push(id); }
        else { weeklyOrder = weeklyOrder.filter(x=>x!==id); }
        renderOrder(); renderPreviewWeekly();
      };
    });
    cont.querySelectorAll('[data-omoveup]:not([disabled])').forEach(btn=>{
      btn.onclick = ()=>{ const i=+btn.dataset.omoveup; [weeklyOrder[i-1],weeklyOrder[i]]=[weeklyOrder[i],weeklyOrder[i-1]]; renderOrder(); renderPreviewWeekly(); };
    });
    cont.querySelectorAll('[data-omovedown]:not([disabled])').forEach(btn=>{
      btn.onclick = ()=>{ const i=+btn.dataset.omovedown; [weeklyOrder[i+1],weeklyOrder[i]]=[weeklyOrder[i],weeklyOrder[i+1]]; renderOrder(); renderPreviewWeekly(); };
    });
  }

  function renderPreviewWeekly(){
    const el = wrap.querySelector('#weeklyPreview');
    const errEl = wrap.querySelector('#weeklyError');
    if(weeklyRoles.length===0){
      el.innerHTML = `<div class="empty" style="padding:6px 4px;">Pick at least one chore above.</div>`;
      errEl.style.display='none';
      return;
    }
    const totalSlots = weeklyRoles.reduce((s,r)=>s+r.slots,0);
    if(totalSlots !== weeklyOrder.length){
      errEl.textContent = `These chores need ${totalSlots} people a week, but the rotation order has ${weeklyOrder.length}. Adjust the "people/wk" numbers so they add up to ${weeklyOrder.length}.`;
      errEl.style.display = 'block';
      el.innerHTML = '';
      return;
    }
    errEl.style.display = 'none';
    const anchor = wrap.querySelector('#wAnchor').value || todayStr();
    let html = '';
    const N = weeklyOrder.length;
    for(let w=0; w<4; w++){
      const start = new Date(anchor+'T00:00:00'); start.setDate(start.getDate()+w*7);
      const end = new Date(start); end.setDate(end.getDate()+6);
      const shift = w % N;
      const rotated = weeklyOrder.slice(shift).concat(weeklyOrder.slice(0, shift));
      let offset = 0;
      const parts = weeklyRoles.map(r=>{
        const slice = rotated.slice(offset, offset+r.slots); offset += r.slots;
        const chore = state.chores.find(c=>c.id===r.choreId);
        const names = slice.map(id=>memberById(id)?.name||'?').join(' & ');
        return `<b>${escapeHtml(chore?chore.title:'?')}:</b> ${escapeHtml(names)}`;
      }).join(' &nbsp;·&nbsp; ');
      html += `<div class="row" style="padding:7px 2px;flex-wrap:wrap;align-items:flex-start;">
        <span class="tag event" style="margin-top:2px;">${fmtDate(isoDate(start))}–${fmtDate(isoDate(end))}</span>
        <div class="row-main row-sub" style="font-size:12px;line-height:1.5;">${parts}</div>
      </div>`;
    }
    el.innerHTML = html;
  }

  renderRoles();
  renderOrder();
  renderPreviewWeekly();
  wrap.querySelector('#wAnchor').addEventListener('change', renderPreviewWeekly);
  wrap.querySelector('#cancelWeekly').onclick = ()=> document.body.removeChild(wrap);

  if(plan){
    wrap.querySelector('#clearPlanBtn').onclick = ()=>{
      state.chores.forEach(c=>{
        if(c.type==='linked'){ c.type='rotating'; c.rotation={intervalWeeks:1, anchorDate:todayStr(), turns:[]}; c.doneForPeriod=null; delete c.doneForWeek; }
      });
      state.weeklyRotation = null;
      saveState(); document.body.removeChild(wrap); render();
    };
  }

  wrap.querySelector('#saveWeekly').onclick = ()=>{
    if(weeklyRoles.length===0) return;
    const totalSlots = weeklyRoles.reduce((s,r)=>s+r.slots,0);
    if(totalSlots !== weeklyOrder.length) return;
    const anchor = wrap.querySelector('#wAnchor').value || todayStr();
    const newRoles = weeklyRoles.map(r=>({...r}));
    state.weeklyRotation = { anchorDate: anchor, order:[...weeklyOrder], roles:newRoles };
    newRoles.forEach(r=>{
      const ch = state.chores.find(c=>c.id===r.choreId);
      if(ch){
        ch.type='linked';
        delete ch.rotation; delete ch.assignee; delete ch.frequency; delete ch.dueDate; delete ch.done; delete ch.doneForPeriod;
        if(ch.doneForWeek===undefined) ch.doneForWeek=null;
      }
    });
    state.chores.forEach(c=>{
      if(c.type==='linked' && !newRoles.some(r=>r.choreId===c.id)){
        c.type='rotating'; c.rotation={intervalWeeks:1, anchorDate:todayStr(), turns:[]}; c.doneForPeriod=null; delete c.doneForWeek;
      }
    });
    saveState();
    document.body.removeChild(wrap);
    render();
  };
}
