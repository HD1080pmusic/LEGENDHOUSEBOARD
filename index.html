/* ---------- BILLS ---------- */
function computeBalances(){
  const bal = {};
  state.members.forEach(m=>bal[m.id]=0);
  state.expenses.filter(ex=>!ex.removed).forEach(ex=>{
    const splitN = ex.splitAmong.length || 1;
    const share = ex.amount / splitN;
    ex.splitAmong.forEach(id=>{ bal[id] = (bal[id]||0) - share; });
    bal[ex.paidBy] = (bal[ex.paidBy]||0) + ex.amount;
  });
  return bal;
}
function settlementPlan(bal){
  const creditors = [], debtors = [];
  Object.entries(bal).forEach(([id,amt])=>{
    if(amt>0.005) creditors.push({id,amt});
    else if(amt<-0.005) debtors.push({id,amt:-amt});
  });
  creditors.sort((a,b)=>b.amt-a.amt);
  debtors.sort((a,b)=>b.amt-a.amt);
  const moves=[]; let i=0,j=0;
  while(i<debtors.length && j<creditors.length){
    const pay = Math.min(debtors[i].amt, creditors[j].amt);
    if(pay>0.005) moves.push({from:debtors[i].id, to:creditors[j].id, amt:pay});
    debtors[i].amt -= pay; creditors[j].amt -= pay;
    if(debtors[i].amt<=0.005) i++;
    if(creditors[j].amt<=0.005) j++;
  }
  return moves;
}

    wrap.querySelector('#deleteRuleBtn').onclick = ()=>{
      state.houseRules = (state.houseRules||[]).filter(r=>r.id!==existing.id);
      saveState(); document.body.removeChild(wrap); render();
    };
  }
  wrap.querySelector('#saveRule').onclick = ()=>{
    const title = wrap.querySelector('#ruleTitle').value.trim();
    const content = wrap.querySelector('#ruleContent').value.trim();
    if(!title){ const el=wrap.querySelector('#ruleError'); el.textContent='Give it a title.'; el.style.display='block'; return; }
    if(isEdit){
      existing.title = title; existing.content = content; existing.updatedAt = Date.now(); existing.updatedBy = currentUserId;
    } else {
      state.houseRules = state.houseRules || [];
      state.houseRules.push({ id:uid(), title, content, updatedAt:Date.now(), updatedBy:currentUserId });
      logXP(currentUserId, 'rule_add', title, XP.ruleAdd);
    }
    saveState(); document.body.removeChild(wrap); render();
  };
}

/* ---------- EVENT HANDLERS ---------- */
function attachHandlers(){
  const c = document.getElementById('content');

  const openChoreBtn = c.querySelector('[data-action="open-chore-modal"]');
  if(openChoreBtn) openChoreBtn.onclick = ()=>openChoreModal();
  const openQuickTaskBtn = c.querySelector('[data-action="open-quick-task"]');
  if(openQuickTaskBtn) openQuickTaskBtn.onclick = ()=>openQuickTaskModal();
  const openXPKeyBtn = c.querySelector('[data-action="open-xp-key"]');
  if(openXPKeyBtn) openXPKeyBtn.onclick = ()=>openXPKeyModal();
  const openAchievementsBtn = c.querySelector('[data-action="open-achievements"]');
  if(openAchievementsBtn) openAchievementsBtn.onclick = ()=>openAchievementsModal();
  const feedPetBtn = c.querySelector('[data-action="feed-pet"]');
  if(feedPetBtn) feedPetBtn.onclick = ()=>{ if(currentUserId) feedPet(currentUserId); };
  const openPlayBtn = c.querySelector('[data-action="open-pet-play"]');
  if(openPlayBtn) openPlayBtn.onclick = ()=>{ if(currentUserId) openPetPlayMenu(currentUserId); };
  const sleepPetBtn = c.querySelector('[data-action="sleep-pet"]');
  if(sleepPetBtn) sleepPetBtn.onclick = ()=>{ if(currentUserId) sleepPet(currentUserId); };
  const cleanPetBtn = c.querySelector('[data-action="clean-pet"]');
  if(cleanPetBtn) cleanPetBtn.onclick = ()=>{ if(currentUserId) cleanPet(currentUserId); };
  const healPetBtn = c.querySelector('[data-action="heal-pet"]');
  if(healPetBtn) healPetBtn.onclick = ()=>{ if(currentUserId) healPet(currentUserId); };
  const pettingBtn = c.querySelector('[data-action="pet-pet"]');
  if(pettingBtn) pettingBtn.onclick = ()=>{ if(currentUserId) pettingPet(currentUserId); };
  c.querySelectorAll('[data-action="start-pet-game"]').forEach(el=> el.onclick = ()=> startPetGame(el.dataset.game));
  const tapNowBtn = c.querySelector('[data-action="pet-tap-now"]');
  if(tapNowBtn) tapNowBtn.onclick = ()=> petTapNow();
  c.querySelectorAll('[data-action="pet-pick-card"]').forEach(el=> el.onclick = ()=> petPickCard(Number(el.dataset.card)));
  const cancelPlayBtn = c.querySelector('[data-action="cancel-pet-play"]');
  if(cancelPlayBtn) cancelPlayBtn.onclick = ()=> closePetPlayMenu();
  const renamePetBtn = c.querySelector('[data-action="rename-pet"]');
  if(renamePetBtn) renamePetBtn.onclick = ()=>{
    if(!currentUserId) return;
    const m = memberById(currentUserId);
    if(!m) return;
    ensurePet(m);
    const name = prompt("Name your pet:", m.pet.name||'');
    if(name===null) return;
    m.pet.name = name.trim().slice(0,24) || null;
    saveState(); render();
  };
  c.querySelectorAll('[data-action="recap-period"]').forEach(el=> el.onclick = ()=>{
    recapPeriod = el.dataset.period;
    render();
  });
  c.querySelectorAll('[data-action="chore-subtab"]').forEach(el=> el.onclick = ()=>{
    choreSubTab = el.dataset.subtab;
    render();
  });
  c.querySelectorAll('[data-action="edit-chore"]').forEach(el=> el.onclick = ()=>{
    const ch = state.chores.find(x=>x.id===el.dataset.id);
    if(ch) openChoreModal(ch);
  });
  c.querySelectorAll('[data-action="swap-chore"]').forEach(el=> el.onclick = ()=>{
    const ch = state.chores.find(x=>x.id===el.dataset.id);
    if(ch) openSwapModal(ch);
  });
  c.querySelectorAll('[data-action="plan-rotation"]').forEach(el=> el.onclick = ()=>{
    const ch = state.chores.find(x=>x.id===el.dataset.id);
    if(ch) openDraftRotationModal(ch);
  });
  c.querySelectorAll('[data-action="chore-menu"]').forEach(el=> el.onclick = ()=>{
    const ch = state.chores.find(x=>x.id===el.dataset.id);
    if(ch) openChoreActionsSheet(ch);
  });
  const openWeeklyBtn = c.querySelector('[data-action="open-weekly-rotation"]');
  if(openWeeklyBtn) openWeeklyBtn.onclick = openWeeklyRotationModal;

  const openRuleBtn = c.querySelector('[data-action="open-rule-modal"]');
  if(openRuleBtn) openRuleBtn.onclick = ()=>openRuleModal();
  c.querySelectorAll('[data-action="edit-rule"]').forEach(el=> el.onclick = ()=>{
    const r = (state.houseRules||[]).find(x=>x.id===el.dataset.id);
    if(r) openRuleModal(r);
  });
  c.querySelectorAll('[data-action="delete-rule"]').forEach(el=> el.onclick = ()=>{
    state.houseRules = (state.houseRules||[]).filter(x=>x.id!==el.dataset.id);
    saveState(); render();
  });

  const calPrev = c.querySelector('[data-action="cal-prev"]');
  if(calPrev) calPrev.onclick = ()=>{ viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} render(); };
  const calNext = c.querySelector('[data-action="cal-next"]');
  if(calNext) calNext.onclick = ()=>{ viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} render(); };
  c.querySelectorAll('.cal-cell[data-date]').forEach(cell=> cell.onclick = ()=>{ selectedCalDate = cell.dataset.date; render(); });
  const addPhotoBtn = c.querySelector('[data-action="add-day-photo"]');
  if(addPhotoBtn) addPhotoBtn.onclick = ()=>{ pendingPhotoDate = selectedCalDate; document.getElementById('dayPhotoFileInput').click(); };
  c.querySelectorAll('[data-action="view-photo"]').forEach(img=>{
    img.onclick = ()=> openPhotoLightbox(selectedCalDate, img.dataset.photoId);
  });

  const eventVisibilitySelect = c.querySelector('#eventVisibility');
  if(eventVisibilitySelect) eventVisibilitySelect.addEventListener('change', ()=>{
    const wrap = c.querySelector('#eventVisibleToWrap');
    if(wrap) wrap.style.display = eventVisibilitySelect.value==='selected' ? 'block' : 'none';
  });
  const visChips = c.querySelectorAll('#eventVisibleToChips .chip');
  visChips.forEach(chip=> chip.onclick = ()=> chip.classList.toggle('active'));

  const addEventBtn = c.querySelector('[data-action="add-event"]');
  if(addEventBtn) addEventBtn.onclick = ()=>{
    const title = c.querySelector('#eventTitle').value.trim();
    const date = c.querySelector('#eventDate').value;
    if(!title || !date) return;
    let visibility = c.querySelector('#eventVisibility') ? c.querySelector('#eventVisibility').value : 'everyone';
    let visibleTo = [];
    if(visibility!=='everyone' && !currentUserId){
      alert("Pick who you are (top right) first to use private or shared events — adding this as visible to everyone instead.");
      visibility = 'everyone';
    }
    if(visibility==='selected'){
      visibleTo = Array.from(c.querySelectorAll('#eventVisibleToChips .chip.active')).map(ch=>ch.dataset.id);
      if(visibleTo.length===0) visibility = 'private';
    }
    state.events.push({id:uid(), title, date, type:c.querySelector('#eventType').value, visibility, visibleTo, createdBy:currentUserId});
    logXP(currentUserId, 'event_add', title, XP.eventAdd);
    saveState(); render();
  };

  const toggleGoogleCard = c.querySelector('[data-action="toggle-google-card"]');
  if(toggleGoogleCard) toggleGoogleCard.onclick = ()=>{
    googleCardCollapsed = !googleCardCollapsed;
    try{ localStorage.setItem('house-board-google-collapsed', String(googleCardCollapsed)); }catch(e){}
    render();
  };

  const syncGoogleBtn = c.querySelector('[data-action="sync-google-calendar"]');
  if(syncGoogleBtn) syncGoogleBtn.onclick = async ()=>{
    const statusEl = c.querySelector('#googleSyncStatus');
    if(statusEl) statusEl.textContent = 'Connecting to Google…';
    try{
      const token = await requestGoogleAccessToken();
      if(statusEl) statusEl.textContent = 'Fetching events…';
      const items = await fetchGoogleCalendarEvents(token);
      const { added, updated } = importGoogleEvents(items, currentUserId);
      await saveState();
      render();
      const freshStatus = document.getElementById('googleSyncStatus');
      if(freshStatus) freshStatus.textContent = `Synced — added ${added}, updated ${updated} event${(added+updated)===1?'':'s'}.`;
    } catch(err){
      console.error('google calendar sync failed', err);
      alert("Couldn't sync with Google Calendar: " + (err.message || err));
      if(statusEl) statusEl.textContent = '';
    }
  };

  const addReminderBtn = c.querySelector('[data-action="add-reminder"]');
  if(addReminderBtn) addReminderBtn.onclick = ()=>{
    const message = c.querySelector('#reminderMsg').value.trim();
    if(!message) return;
    const from = c.querySelector('#reminderFrom').value;
    state.reminders.push({ id:uid(), message, from, to: c.querySelector('#reminderTo').value, done:false, createdAt:Date.now() });
    logXP(from, 'reminder_post', message, XP.reminderPost);
    saveState(); render();
  };

  const addGroceryBtn = c.querySelector('[data-action="add-grocery"]');
  if(addGroceryBtn){
    const doAdd = ()=>{
      const input = c.querySelector('#groceryText');
      const text = input.value.trim();
      if(!text) return;
      state.groceryItems.push({ id:uid(), text, done:false, addedBy:currentUserId, addedAt:Date.now() });
      logXP(currentUserId, 'grocery_add', text, XP.groceryAdd);
      saveState(); render();
    };
    addGroceryBtn.onclick = doAdd;
    const groceryInput = c.querySelector('#groceryText');
    if(groceryInput) groceryInput.addEventListener('keydown', e=>{ if(e.key==='Enter') doAdd(); });
  }
  c.querySelectorAll('[data-action="toggle-grocery"]').forEach(el=> el.onclick = ()=>{
    const item = state.groceryItems.find(i=>i.id===el.dataset.id);
    if(!item) return;
    const justBought = !item.done;
    item.done = justBought;
    if(justBought) logXP(currentUserId, 'grocery_buy', item.text, XP.groceryBuy);
    saveState(); render();
  });
  c.querySelectorAll('[data-action="delete-grocery"]').forEach(el=> el.onclick = ()=>{
    state.groceryItems = state.groceryItems.filter(i=>i.id!==el.dataset.id);
    saveState(); render();
  });
  const clearCheckedBtn = c.querySelector('[data-action="clear-checked-grocery"]');
  if(clearCheckedBtn) clearCheckedBtn.onclick = ()=>{
    state.groceryItems = state.groceryItems.filter(i=>!i.done);
    saveState(); render();
  };

  const splitChips = c.querySelectorAll('#splitChips .chip');
  splitChips.forEach(ch=> ch.onclick = ()=> ch.classList.toggle('active'));

  const addExpenseBtn = c.querySelector('[data-action="add-expense"]');
  if(addExpenseBtn) addExpenseBtn.onclick = ()=>{
    const description = c.querySelector('#expDesc').value.trim();
    const amount = parseFloat(c.querySelector('#expAmount').value);
    const paidBy = c.querySelector('#expPaidBy').value;
    const splitAmong = Array.from(c.querySelectorAll('#splitChips .chip.active')).map(ch=>ch.dataset.id);
    if(!description || !amount || amount<=0 || splitAmong.length===0) return;
    state.expenses.push({id:uid(), description, amount, paidBy, splitAmong, createdAt:Date.now(), removed:false, removedAt:null, removedBy:null});
    logXP(paidBy, 'expense_add', description, XP.expenseAdd);
    saveState(); render();
  };

  c.querySelectorAll('[data-action="toggle-chore"]').forEach(el=> el.onclick = ()=>{
    const ch = state.chores.find(x=>x.id===el.dataset.id);
    if(!ch) return;
    if(ch.type==='linked'){
      const plan = state.weeklyRotation;
      if(!plan) return;
      const weekIdx = weeklyPlanPeriod(plan).weekIndex;
      ch.doneForWeek = ch.doneForWeek===weekIdx ? null : weekIdx;
    } else if(ch.type==='rotating'){
      const st = rotationStatus(ch);
      const key = `${st.cycleNumber}-${st.periodIndex}`;
      const wasDone = ch.doneForPeriod===key;
      ch.doneForPeriod = wasDone ? null : key;
      if(!wasDone){ (st.turnMembers||[]).forEach(mid=> logCompletion(mid, ch.id, ch.title, choreXPValue(ch))); }
    } else {
      const justCompleted = !ch.done;
      ch.done = justCompleted;
      if(justCompleted) logCompletion(ch.assignee, ch.id, ch.title, choreXPValue(ch));
      if(ch.done && ch.frequency!=='one-time'){
        const next = new Date(ch.dueDate+'T00:00:00');
        if(ch.frequency==='daily') next.setDate(next.getDate()+1);
        if(ch.frequency==='weekly') next.setDate(next.getDate()+7);
        if(ch.frequency==='monthly') next.setMonth(next.getMonth()+1);
        ch.dueDate = next.toISOString().slice(0,10);
        ch.done = false;
      }
    }
    saveState(); render();
  });
  c.querySelectorAll('[data-action="delete-chore"]').forEach(el=> el.onclick = ()=>{
    state.chores = state.chores.filter(x=>x.id!==el.dataset.id); saveState(); render();
  });
  c.querySelectorAll('[data-action="delete-event"]').forEach(el=> el.onclick = ()=>{
    state.events = state.events.filter(x=>x.id!==el.dataset.id); saveState(); render();
  });
  c.querySelectorAll('[data-action="toggle-reminder"]').forEach(el=> el.onclick = ()=>{
    const r = state.reminders.find(x=>x.id===el.dataset.id);
    if(!r) return;
    const justDone = !r.done;
    r.done = justDone;
    if(justDone) logXP(currentUserId, 'reminder_done', r.message, XP.reminderDone);
    saveState(); render();
  });
  c.querySelectorAll('[data-action="delete-reminder"]').forEach(el=> el.onclick = ()=>{
    state.reminders = state.reminders.filter(x=>x.id!==el.dataset.id); saveState(); render();
  });
  c.querySelectorAll('[data-action="remove-expense"]').forEach(el=> el.onclick = ()=>{
    const ex = state.expenses.find(x=>x.id===el.dataset.id);
    if(!ex) return;
    if(currentUserId !== ex.paidBy) return; // only the person who was paid can remove it
    ex.removed = true;
    ex.removedAt = Date.now();
    ex.removedBy = currentUserId;
    saveState(); render();
  });
  c.querySelectorAll('[data-action="restore-expense"]').forEach(el=> el.onclick = ()=>{
    const ex = state.expenses.find(x=>x.id===el.dataset.id);
    if(!ex) return;
    if(currentUserId !== ex.paidBy) return;
    ex.removed = false;
    ex.removedAt = null;
    ex.removedBy = null;
    saveState(); render();
  });
}

init();
</script>
</body>
</html>
